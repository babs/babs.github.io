baseURL: https://babs.github.io/
languageCode: en-us
title: babs.github.io
enableGitInfo: true

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  defaultTheme: dark
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  label:
    text: "babs.github.io"
    icon: "https://avatars.githubusercontent.com/u/117580?v=4&s=40"
    iconHeight: 30
  profileMode:
    enabled: true
    title: "Damien Degois"
    subtitle: |
      Head of SRE with 20+ years building and running infrastructure at scale.
      I like Go, Python, and solving operational problems with minimal, self-contained tools.
    imageUrl: "https://avatars.githubusercontent.com/u/117580?v=4"
    imageWidth: 240
    imageHeight: 240
    imageTitle: "Damien Degois"
    buttons:
      - name: Projects
        url: /projects
      - name: Contributions
        url: /contributions
      - name: GitHub
        url: "https://github.com/babs/"

menu:
  main:
    - name: Projects
      url: /projects
      weight: 1
    - name: Contributions
      url: /contributions
      weight: 2
    - name: GitHub
      url: "https://github.com/babs/"
      weight: 3

services:
  googleAnalytics:
    ID: G-TLRKCBBGRY
